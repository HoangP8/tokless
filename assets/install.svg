<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-kerning="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2128"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="10" y="10" width="800" height="400" rx="10" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
    <rect x="10" y="10" width="800" height="34" rx="10" fill="url(#titlebar)"/>
    <rect x="10" y="32" width="800" height="12" fill="url(#titlebar)"/>
    <circle cx="30" cy="27" r="6" fill="#ff5f56"/>
    <circle cx="50" cy="27" r="6" fill="#ffbd2e"/>
    <circle cx="70" cy="27" r="6" fill="#27c93f"/>
    <text x="410" y="32" fill="#8b949e" text-anchor="middle" font-size="12.5">tokless — install</text>
  </g>

  <g font-size="14" xml:space="preserve">
    <text x="32" y="74"><tspan fill="#3fb950">$ </tspan><tspan fill="#c9d1d9">curl -fsSL https://raw.githubusercontent.com/HoangP8/tokless/main/scripts/install.sh | bash</tspan></text>
    <text x="32" y="98"><tspan fill="#3fb950">↓ </tspan><tspan fill="#8b949e">Downloading </tspan><tspan fill="#c9d1d9">tokless</tspan><tspan fill="#8b949e">…</tspan></text>
    <text x="32" y="118"><tspan fill="#3fb950">✔ </tspan><tspan fill="#c9d1d9">installed </tspan><tspan fill="#c9d1d9" font-weight="bold">tokless v1.2.3</tspan><tspan fill="#8b949e"> → </tspan><tspan fill="#c9d1d9">~/.local/bin/tokless</tspan></text>
  </g>

  <line x1="32" y1="140" x2="788" y2="140" stroke="#21262d" stroke-width="1"/>

  <!-- Interactive picker — matches prompt.go MultiSelect render() lines 284–335 -->
  <!-- No font-weight:bold — SVG bold glyphs are wider, breaking monospace alignment -->
  <!-- Terminal bold = increased brightness/color, not glyph width change -->

  <g font-size="13" xml:space="preserve">
    <text x="32" y="168">
      <tspan fill="#a371f7">●</tspan>
      <tspan fill="#a371f7"> Select agents to install tokless</tspan>
    </text>

    <!-- Claude Code (pad=1, selected+active): pad+gap = 1+2 = 3 spaces before tag arrow -->
    <text x="32" y="196">
      <tspan fill="#6e7681">│   </tspan>
      <tspan fill="#56b6c2">❯ </tspan>
      <tspan fill="#3fb950">◉  </tspan>
      <tspan fill="#56b6c2">Claude Code</tspan>
      <tspan fill="#c9d1d9">   </tspan>
      <tspan fill="#3fb950">✓ </tspan>
      <tspan fill="#3fb950">[READY]</tspan>
      <tspan fill="#c9d1d9">  </tspan>
    </text>

    <!-- OpenCode (pad=3, unselected): pad+gap+tagPad = 3+2+2 = 7 before bracket -->
    <text x="32" y="218">
      <tspan fill="#6e7681">│     </tspan>
      <tspan fill="#8b949e">◯  </tspan>
      <tspan fill="#c9d1d9">OpenCode</tspan>
      <tspan fill="#c9d1d9">       </tspan>
      <tspan fill="#3fb950">[READY]</tspan>
      <tspan fill="#c9d1d9">  </tspan>
    </text>

    <!-- Codex (pad=6): 6+2+2 = 10 before bracket -->
    <text x="32" y="240">
      <tspan fill="#6e7681">│     </tspan>
      <tspan fill="#8b949e">◯  </tspan>
      <tspan fill="#c9d1d9">Codex</tspan>
      <tspan fill="#c9d1d9">          </tspan>
      <tspan fill="#3fb950">[READY]</tspan>
      <tspan fill="#c9d1d9">  </tspan>
    </text>

    <!-- Antigravity (pad=0): 0+2+2 = 4 before bracket -->
    <text x="32" y="262">
      <tspan fill="#6e7681">│     </tspan>
      <tspan fill="#8b949e">◯  </tspan>
      <tspan fill="#c9d1d9">Antigravity</tspan>
      <tspan fill="#c9d1d9">    </tspan>
      <tspan fill="#3fb950">[READY]</tspan>
      <tspan fill="#c9d1d9">  </tspan>
    </text>

    <line x1="32" y1="282" x2="788" y2="282" stroke="#21262d" stroke-width="1"/>

    <!-- Key hint — matches prompt.go:278–282 -->
    <text x="32" y="306" font-size="12" xml:space="preserve">
      <tspan fill="#d75f00">↑/↓</tspan><tspan fill="#6e7681"> move · </tspan>
      <tspan fill="#d75f00">&lt;space&gt;</tspan><tspan fill="#6e7681"> select · </tspan>
      <tspan fill="#d75f00">&lt;a&gt;</tspan><tspan fill="#6e7681"> all · </tspan>
      <tspan fill="#d75f00">&lt;enter&gt;</tspan><tspan fill="#6e7681"> confirm</tspan>
    </text>
  </g>

  <line x1="32" y1="330" x2="788" y2="330" stroke="#21262d" stroke-width="1"/>

  <g font-size="13" xml:space="preserve">
    <text x="32" y="356">
      <tspan fill="#a371f7">●</tspan>
      <tspan fill="#a371f7"> Wiring 5 tools into 4 agents</tspan>
    </text>
    <text x="32" y="378"><tspan fill="#8b949e">  rtk · caveman · ponytail · codegraph · context-mode</tspan></text>
    <text x="32" y="400">
      <tspan fill="#3fb950">✔ </tspan>
      <tspan fill="#c9d1d9">done in </tspan>
      <tspan fill="#c9d1d9" font-weight="bold">12s</tspan>
      <tspan fill="#8b949e"> — restart your agent and enjoy</tspan>
    </text>
  </g>
</svg>
