<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-label="4 tools, each kills a different token waste source">
  <title>tokless: 4 tools, 4 waste sources</title>
  <defs>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3fb950"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f0883e"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a371f7"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="900" height="620" fill="#0d1117"/>

  <!-- caption -->
  <text x="450" y="34" text-anchor="middle" fill="#8b949e"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
    4 tools · 4 waste sources · no overlap · real before/after
  </text>

  <!-- ============ CARD 1: RTK (top-left) ============ -->
  <g>
    <rect x="40" y="60" width="410" height="250" rx="10" ry="10"
          fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
    <rect x="40" y="60" width="410" height="36" rx="10" ry="10" fill="#3fb950" fill-opacity="0.12"/>
    <rect x="40" y="86" width="410" height="10" fill="#3fb950" fill-opacity="0.12"/>
    <text x="60" y="84" fill="#3fb950"
          font-family="ui-monospace, monospace" font-size="16" font-weight="700">RTK</text>
    <text x="430" y="84" text-anchor="end" fill="#8b949e"
          font-family="ui-monospace, monospace" font-size="11">shorten long output</text>

    <!-- BEFORE panel -->
    <rect x="58" y="112" width="170" height="180" rx="6" ry="6"
          fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="68" y="130" fill="#8b949e"
          font-family="ui-monospace, monospace" font-size="9.5" font-weight="700">BEFORE</text>
    <g font-family="ui-monospace, monospace" font-size="10" fill="#8b949e">
      <text x="68" y="150">$ git status</text>
      <text x="68" y="166" fill="#c9d1d9">On branch main</text>
      <text x="68" y="180" fill="#c9d1d9">Changes not staged:</text>
      <text x="68" y="196" fill="#c9d1d9">  modified: src/app.ts</text>
      <text x="68" y="210" fill="#c9d1d9">  modified: lib/auth.ts</text>
      <text x="68" y="226" fill="#c9d1d9">  ... (8 more)</text>
      <text x="68" y="248" fill="#c9d1d9">  src/util.ts</text>
      <text x="68" y="262" fill="#c9d1d9">  lib/session.ts</text>
      <text x="68" y="278" fill="#8b949e">~800 tokens</text>
    </g>

    <!-- arrow BEFORE -> AFTER -->
    <line x1="232" y1="202" x2="258" y2="202" stroke="#3fb950" stroke-width="2.2" marker-end="url(#arrGreen)"/>

    <!-- AFTER panel -->
    <rect x="262" y="112" width="170" height="180" rx="6" ry="6"
          fill="#0d1117" stroke="#3fb950" stroke-width="1.4" fill-opacity="0.6"/>
    <rect x="262" y="112" width="170" height="180" rx="6" ry="6"
          fill="#3fb950" fill-opacity="0.06"/>
    <text x="272" y="130" fill="#3fb950"
          font-family="ui-monospace, monospace" font-size="9.5" font-weight="700">AFTER</text>
    <g font-family="ui-monospace, monospace" font-size="10" fill="#c9d1d9">
      <text x="272" y="150">$ rtk git status</text>
      <text x="272" y="170" fill="#3fb950">main</text>
      <text x="272" y="186" fill="#c9d1d9">  2 modified</text>
      <text x="272" y="202" fill="#c9d1d9">  8 more</text>
      <text x="272" y="278" fill="#3fb950" font-weight="700">~150 tokens</text>
    </g>
  </g>

  <!-- ============ CARD 2: Caveman (top-right) ============ -->
  <g>
    <rect x="460" y="60" width="410" height="250" rx="10" ry="10"
          fill="#0d1117" stroke="#f0883e" stroke-width="2"/>
    <rect x="460" y="60" width="410" height="36" rx="10" ry="10" fill="#f0883e" fill-opacity="0.12"/>
    <rect x="460" y="86" width="410" height="10" fill="#f0883e" fill-opacity="0.12"/>
    <text x="480" y="84" fill="#f0883e"
          font-family="ui-monospace, monospace" font-size="16" font-weight="700">CAVEMAN</text>
    <text x="850" y="84" text-anchor="end" fill="#8b949e"
          font-family="ui-monospace, monospace" font-size="11">short, direct answers</text>

    <!-- BEFORE panel -->
    <rect x="478" y="112" width="170" height="180" rx="6" ry="6"
          fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="488" y="130" fill="#8b949e"
          font-family="ui-monospace, monospace" font-size="9.5" font-weight="700">BEFORE</text>
    <g font-family="ui-monospace, monospace" font-size="9" fill="#c9d1d9">
      <text x="488" y="148">"Sure! I'd be happy</text>
      <text x="488" y="161">to help you with that.</text>
      <text x="488" y="174">The reason your</text>
      <text x="488" y="187">component re-renders</text>
      <text x="488" y="200">is likely because</text>
      <text x="488" y="213">you're creating a</text>
      <text x="488" y="226">new object reference</text>
      <text x="488" y="239">on each render...</text>
      <text x="488" y="278" fill="#8b949e">69 tokens</text>
    </g>

    <line x1="652" y1="202" x2="678" y2="202" stroke="#f0883e" stroke-width="2.2" marker-end="url(#arrOrange)"/>

    <!-- AFTER panel -->
    <rect x="682" y="112" width="170" height="180" rx="6" ry="6"
          fill="#0d1117" stroke="#f0883e" stroke-width="1.4" fill-opacity="0.6"/>
    <rect x="682" y="112" width="170" height="180" rx="6" ry="6"
          fill="#f0883e" fill-opacity="0.06"/>
    <text x="692" y="130" fill="#f0883e"
          font-family="ui-monospace, monospace" font-size="9.5" font-weight="700">AFTER</text>
    <g font-family="ui-monospace, monospace" font-size="10" fill="#c9d1d9">
      <text x="692" y="152">"New obj ref each</text>
      <text x="692" y="166">render. Inline object</text>
      <text x="692" y="180">prop = new ref =</text>
      <text x="692" y="194">re-render. Wrap in</text>
      <text x="692" y="208" fill="#f0883e" font-weight="700">useMemo</text>
      <text x="692" y="222" fill="#f0883e" font-weight="700">."</text>
      <text x="692" y="278" fill="#f0883e" font-weight="700">19 tokens</text>
    </g>
  </g>

  <!-- ============ CARD 3: CodeGraph (bottom-left) ============ -->
  <g>
    <rect x="40" y="330" width="410" height="250" rx="10" ry="10"
          fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <rect x="40" y="330" width="410" height="36" rx="10" ry="10" fill="#58a6ff" fill-opacity="0.12"/>
    <rect x="40" y="356" width="410" height="10" fill="#58a6ff" fill-opacity="0.12"/>
    <text x="60" y="354" fill="#58a6ff"
          font-family="ui-monospace, monospace" font-size="16" font-weight="700">CODEGRAPH</text>
    <text x="430" y="354" text-anchor="end" fill="#8b949e"
          font-family="ui-monospace, monospace" font-size="11">ask the graph, no file reads</text>

    <!-- BEFORE panel -->
    <rect x="58" y="382" width="170" height="180" rx="6" ry="6"
          fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="68" y="400" fill="#8b949e"
          font-family="ui-monospace, monospace" font-size="9.5" font-weight="700">BEFORE</text>
    <g font-family="ui-monospace, monospace" font-size="10" fill="#c9d1d9">
      <text x="68" y="420">read src/auth.ts</text>
      <text x="68" y="436" fill="#8b949e">  412 lines</text>
      <text x="68" y="456">read src/session.ts</text>
      <text x="68" y="472" fill="#8b949e">  287 lines</text>
      <text x="68" y="492">read src/util.ts</text>
      <text x="68" y="508" fill="#8b949e">  156 lines</text>
      <text x="68" y="540" fill="#8b949e">855 lines, ~6.2K tok</text>
    </g>

    <line x1="232" y1="472" x2="258" y2="472" stroke="#58a6ff" stroke-width="2.2" marker-end="url(#arrBlue)"/>

    <!-- AFTER panel -->
    <rect x="262" y="382" width="170" height="180" rx="6" ry="6"
          fill="#0d1117" stroke="#58a6ff" stroke-width="1.4" fill-opacity="0.6"/>
    <rect x="262" y="382" width="170" height="180" rx="6" ry="6"
          fill="#58a6ff" fill-opacity="0.06"/>
    <text x="272" y="400" fill="#58a6ff"
          font-family="ui-monospace, monospace" font-size="9.5" font-weight="700">AFTER</text>
    <g font-family="ui-monospace, monospace" font-size="10" fill="#c9d1d9">
      <text x="272" y="420">$ codegraph explore</text>
      <text x="272" y="434" fill="#c9d1d9">  "AuthService</text>
      <text x="272" y="448" fill="#c9d1d9">  loginUser"</text>
      <text x="272" y="478" fill="#58a6ff">→ 3 symbols</text>
      <text x="272" y="494" fill="#58a6ff">→ call paths</text>
      <text x="272" y="510" fill="#58a6ff">→ 1 capped call</text>
      <text x="272" y="540" fill="#58a6ff" font-weight="700">0 file reads</text>
    </g>
  </g>

  <!-- ============ CARD 4: Context-Mode (bottom-right) ============ -->
  <g>
    <rect x="460" y="330" width="410" height="250" rx="10" ry="10"
          fill="#0d1117" stroke="#a371f7" stroke-width="2"/>
    <rect x="460" y="330" width="410" height="36" rx="10" ry="10" fill="#a371f7" fill-opacity="0.12"/>
    <rect x="460" y="356" width="410" height="10" fill="#a371f7" fill-opacity="0.12"/>
    <text x="480" y="354" fill="#a371f7"
          font-family="ui-monospace, monospace" font-size="15" font-weight="700">CONTEXT-MODE</text>
    <text x="850" y="354" text-anchor="end" fill="#8b949e"
          font-family="ui-monospace, monospace" font-size="11">process big output, keep small</text>

    <!-- BEFORE panel -->
    <rect x="478" y="382" width="170" height="180" rx="6" ry="6"
          fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="488" y="400" fill="#8b949e"
          font-family="ui-monospace, monospace" font-size="9.5" font-weight="700">BEFORE</text>
    <g font-family="ui-monospace, monospace" font-size="10" fill="#c9d1d9">
      <text x="488" y="426" font-size="22" font-weight="700">700KB</text>
      <text x="488" y="444">log raw</text>
      <text x="488" y="468" fill="#8b949e">cat build.log |</text>
      <text x="488" y="482" fill="#8b949e">grep ERROR</text>
      <text x="488" y="510" fill="#c9d1d9">raw bytes flood</text>
      <text x="488" y="524" fill="#c9d1d9">context window</text>
      <text x="488" y="552" fill="#8b949e">~180K tokens</text>
    </g>

    <line x1="652" y1="472" x2="678" y2="472" stroke="#a371f7" stroke-width="2.2" marker-end="url(#arrPurple)"/>

    <!-- AFTER panel -->
    <rect x="682" y="382" width="170" height="180" rx="6" ry="6"
          fill="#0d1117" stroke="#a371f7" stroke-width="1.4" fill-opacity="0.6"/>
    <rect x="682" y="382" width="170" height="180" rx="6" ry="6"
          fill="#a371f7" fill-opacity="0.06"/>
    <text x="692" y="400" fill="#a371f7"
          font-family="ui-monospace, monospace" font-size="9.5" font-weight="700">AFTER</text>
    <g font-family="ui-monospace, monospace" font-size="10" fill="#c9d1d9">
      <text x="692" y="420">$ ctx_execute_file</text>
      <text x="692" y="434" fill="#c9d1d9">  build.log</text>
      <text x="692" y="464" fill="#a371f7">→ 3KB summary</text>
      <text x="692" y="480" fill="#a371f7">→ raw stays in</text>
      <text x="692" y="494" fill="#a371f7">  sandbox</text>
      <text x="692" y="552" fill="#a371f7" font-weight="700">~750 tokens</text>
    </g>
  </g>

  <!-- footer removed -->
</svg>
